short_bio: >-
  <p>Welcome to my homepage!
  </p>
  <p>
  I am a postdoctoral researcher in the <a href="https://www.cs.cas.cz/logics/" target="_blank">LogICS</a> group at the <a href="https://www.cs.cas.cz/en" target="_blank">Institute of Computer Science</a> of 
  the Czech Academy of Sciences. 
  I am a member of the <a href="http://www.wesleyfussner.com/team.html" target="_blank">Metalogic Group</a>, working on the <a href="http://www.wesleyfussner.com/team.html" target="_blank">INTERACT</a> project (PI: <a href="http://www.wesleyfussner.com" target="_blank">Dr. Wesley Fussner</a>).
  </p>
  <p>
  My research specializes in structural proof theory for non-classical systems comprising modal and substructural logics. I focus on the development of structured calculi—notably variants of nested sequent calculi—investigating their properties and applications within various logical contexts. 
  </p>
  <p>
  Prior to the current position, I completed my Ph.D. in October 2025 under the 
  supervision of 
  <a href="https://pageperso.lis-lab.fr/nicola.olivetti/" target="_blank">Prof. Nicola Olivetti</a> at <a href="https://www.lis-lab.fr" target="_blank">Laboratoire d'Informatique et Systèmes (LIS)</a>, 
  affiliated with Aix-Marseille Université and CNRS. In my thesis, I conducted proof-theoretic studies on (intuitionistic) modal logics. 
  Before starting my Ph.D., I received my Master's degree in 2022 and Bachelor's degree in 2019. 
  </p>
  <p>
  My complete academic résumé is available upon request.
  </p>
  <p>
  I was born and raised in 江苏 - <a href="https://en.wikipedia.org/wiki/Jiangsu" target="_blank">Jiangsu</a>, which is China's most beautiful and open-minded province. I spent my childhood in 东台 - <a href="https://en.wikipedia.org/wiki/Dongtai" target="_blank">Dongtai</a> and three years of adolescence in 苏州 - <a href="https://en.wikipedia.org/wiki/Suzhou" target="_blank">Suzhou</a>. I studied in several inland cities in northern China and worked briefly at a media company as a junior column writer during the COVID-19 pandemic in 2022. 
  </p>

